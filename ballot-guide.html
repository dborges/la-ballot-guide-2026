{n:'Jeffrey Prang',p:'Nonpartisan',d:'Assessor, LA County (Incumbent)',bio:`Current LA County Assessor since 2014 — managing the largest local assessment agency in the United States, overseeing 2.6 million properties valued at over $2.2 trillion with 1,400 employees. Before becoming Assessor, served nearly 18 years on the West Hollywood City Council including four terms as Mayor. Harvard Kennedy School graduate. Known for championing property tax reform and assessment equity.`},
{n:'Stephen A. Adamus',p:'Nonpartisan',d:'Property Assessments Specialist',bio:`A 14-year assessor's office veteran and whistleblower — was one of three employees who sued Jeffrey Prang in 2019 alleging the office gave politically favored property owners illegal tax breaks. In March 2026, a jury awarded him $570,000 in that case. Now running against the very boss he successfully sued, making his campaign the most contentious insider challenge in the race.`},
{n:'Sandy Sun',p:'Nonpartisan',d:'Certified Appraiser, LA County',bio:`26-year veteran of the LA County Assessor's Office who is cross-trained in both real property and personal property assessments. A repeat candidate — she received 22.5% of the vote in the 2022 race for this same seat. Running again as a certified appraiser insider challenging incumbent Jeffrey Prang.`},
{n:'Rob Newland',p:'Nonpartisan',d:'Appraiser/Housing Economist',bio:`Real estate appraiser and housing economist since 1998. Wants to use the Assessor's massive property dataset to build a countywide vacant property transparency map and identify illegal short-term rentals. The only non-assessor-office insider in the 2026 race, pitching the role as broader than just tax valuation.`},
]},
]},

{section:'JUDICIAL',races:[
{id:'j2',office:'JUDGE — Superior Court, Office No. 2',jur:'judicial',cx:[
{n:'Robert S. Draper',p:'Nonpartisan',d:'Judge of the Superior Court (Incumbent)',bio:`Appointed by Governor Jerry Brown in 2012. Currently faces charges from the California Commission on Judicial Performance that could result in his removal from the bench — allegations include racist remarks on the record, sexually inappropriate conversations, and unwanted touching. Has publicly disclosed having Parkinson's disease; a presiding judge determined he was unfit to hear cases, yet he filed to run for reelection.`},
{n:'Tal K. Valbuena',p:'Nonpartisan',d:'Deputy District Attorney, County of LA',bio:`Immigrant from Karachi, Pakistan who arrived in the U.S. in 2000. Passed the California bar in 2014 and joined the LA County DA's Office in 2016. Sits on the LA County LGBTQ+ Commission, teaches a college course on legal rights, and serves as treasurer of the Southern California chapter of the South Asian Bar Association. Rated "Qualified" by the LA County Bar Association.`},
]},
{id:'j14',office:'JUDGE — Superior Court, Office No. 14',jur:'judicial',cx:[
{n:'Irene Lee',p:'Nonpartisan',d:'Deputy District Attorney, County of LA',bio:`Nearly 14 years as an LA County deputy DA focused on domestic violence and child abuse cases before moving to county counsel's office in Juvenile Dependency Court. Now a Special Assistant to DA Nathan Hochman, running a fentanyl awareness campaign. Rated "Well Qualified" by the bar association. Endorsed by the current DA and two former DAs.`},
{n:'Angie Chrestides',p:'Nonpartisan',d:'Deputy District Attorney, County of LA',bio:`20-year prosecutor who also worked in Veterans Court and Community Collaborative Court. Her candidacy revived scrutiny of a 2017 murder case in which internal investigations by both the Long Beach Police Department and the DA's Office found she misrepresented facts to the court by falsely accusing two detectives of withholding information.`},
]},
{id:'j39',office:'JUDGE — Superior Court, Office No. 39',jur:'judicial',cx:[
{n:'Binh Q. Dang',p:'Nonpartisan',d:'Deputy Public Defender, County of LA',bio:`Refugee from Vietnam who came to the United States as a child. Has spent nearly 20 years as an LA County Deputy Public Defender, completing more than 100 jury trials and adjudications. His personal experience as a refugee directly shapes his stated commitment to treating every person who appears before the court with dignity and respect. The only listed candidate for this judicial seat.`},
]},
{id:'j60',office:'JUDGE — Superior Court, Office No. 60',jur:'judicial',cx:[
{n:'Ann M. Maurer',p:'Nonpartisan',d:'First Assistant City Attorney, City of Glendale',bio:`Has served as First Assistant City Attorney for Glendale for over three decades, handling the city's most complex and high-stakes litigation as a veteran trial lawyer and public agency advisor. Licensed to practice law for 30 years. The only listed candidate for this judicial seat.`},
]},
{id:'j64',office:'JUDGE — Superior Court, Office No. 64',jur:'judicial',cx:[
{n:'Maria Ghobadi',p:'Nonpartisan',d:'Deputy District Attorney, County of LA',bio:`Prosecutor with 17+ years in the LA DA's Office. Has completed 21 homicide trials, 85 jury trials total, and more than 1,500 preliminary hearings. Took a pay cut to join the LA office at entry level, having previously prosecuted in Northern California. Rated "Well Qualified" by the bar association. Endorsed by over 50 judges, including the supervising judge of the criminal courts.`},
{n:'Rhonda A. Haymon',p:'Nonpartisan',d:'Deputy Public Defender, County of LA',bio:`Public defender for over 26 years, starting at the Orange County Public Defender's Office before moving to LA County. Earned her law degree from Willamette University and her bachelor's from Tuskegee University. Has tried more than 100 felony and misdemeanor jury trials, defending clients in cases ranging from petty theft to homicide.`},
{n:'Francisco Amador',p:'Nonpartisan',d:'Attorney at Law',bio:`Marine Corps veteran who now practices law. Running for judicial office to bring a public service ethic to the bench. Rated "Not Qualified" by the LA County Bar Association's evaluation committee.`},
]},
{id:'j65',office:'JUDGE — Superior Court, Office No. 65',jur:'judicial',cx:[
{n:'Anna Slotky Reitano',p:'Nonpartisan',d:'Deputy County Counsel, County of LA',bio:`Before law school, had a notable childhood acting career — played Ruth Ann Torkelson in the NBC sitcom "The Torkelsons" (1991–1992) and appeared in "Home Alone" (1990) and "Home Alone 2: Lost in New York" (1992). Now works as a Deputy County Counsel in LA County's Justice and Safety Division. This is at least her second run for a Superior Court seat, having lost a 2022 general election race for a different office.`},
{n:'Justin Allen Clayton',p:'Nonpartisan',d:'Deputy Public Defender, County of LA',bio:`14-year public defender and current Deputy in Charge of the Inglewood branch of the LA County Public Defender's Office, where he supervises attorneys and trains new lawyers. Has completed dozens of trials, including three life cases, and appeared in more than 1,000 adult matters. Backed by the Beach Cities Democrats.`},
{n:'Samuel Wolloch Krause',p:'Nonpartisan',d:'Attorney/Legal Auditor',bio:`ERISA and employee benefits specialist who worked at elite national firms including Skadden Arps, Hogan & Hartson, and Crowell & Moring. Brings nearly three decades of corporate law experience to a race dominated by criminal practitioners. His candidacy drew controversy when the Registrar-Recorder initially approved — then revoked — his proposed ballot designation of "Attorney/Temporary Judge" because use of the word "Judge" is prohibited under California election rules.`},
{n:'Chellee G. Jimenez',p:'Nonpartisan',d:'Attorney',bio:`Family law specialist and managing attorney of her own firm who has taken hundreds of cases from start to finish and tried more than 300 matters to decision — breadth of courtroom experience that is relatively unusual among private-practice judicial candidates. Bar evaluations describe her as intelligent, articulate, and possessing an ideal judicial temperament.`},
]},
{id:'j66',office:'JUDGE — Superior Court, Office No. 66',jur:'judicial',cx:[
{n:'Ben Forer',p:'Nonpartisan',d:'Deputy District Attorney, County of LA',bio:`Veteran cybercrime prosecutor in the DA's High-Tech Crimes Unit. Simultaneously a professor of Cyber and Privacy Law at USC's Viterbi School of Engineering and the author of two legal textbooks on privacy and cyber law. Also an ordained rabbi — bringing one of the most uniquely diverse profiles in the race: prosecutor, academic, and religious leader.`},
{n:'Cheryl C. Turner',p:'Nonpartisan',d:'Attorney at Law',bio:`Private practitioner handling employment litigation, banking and finance cases, and criminal defense. Also serves as a temporary Superior Court judge — giving her actual bench experience ahead of this run for a permanent seat. Rated "Qualified" by the LA County Bar Association.`},
]},
{id:'j81',office:'JUDGE — Superior Court, Office No. 81',jur:'judicial',cx:[
{n:'David Walgren',p:'Nonpartisan',d:'Judge of the Superior Court (Incumbent)',bio:`Best known for securing the involuntary manslaughter conviction of Dr. Conrad Murray — the physician who treated Michael Jackson with fatal doses of propofol — in one of the most watched celebrity criminal trials in recent memory. Spent 16 years as an LA County deputy DA before being appointed to the Superior Court in 2012. Rated "Exceptionally Well Qualified" by the bar association — the highest rating available.`},
{n:'Dan Kapelovitz',p:'Nonpartisan',d:'Attorney/Experimental Filmmaker',bio:`Before law school, was Features Editor of Hustler Magazine and wrote for the LA Weekly and OC Weekly. Graduated in the top ten of his UCLA law class and clerked for a federal judge. An award-winning experimental filmmaker who spent 20 years completing a project merging all three Amy Fisher made-for-TV movies into one meta-drama. This is at least his fourth run for office — after failed bids for Governor (2021 recall), State AG (2022), and LA County DA (2024).`},
]},
{id:'j87',office:'JUDGE — Superior Court, Office No. 87',jur:'judicial',cx:[
{n:'Sharez Sanders Gordon',p:'Nonpartisan',d:'Deputy City Attorney, City of LA',bio:`Former elementary school teacher in Watts who transitioned to law. LA Deputy City Attorney for 25+ years. Helped launch the Neighborhood Prosecutor Program in 2002, directed the city attorney's prostitution diversion project, and led the Neighborhood School Safety Program for a decade. Also served as a temporary judge and mock trial judge for student competitions.`},
{n:'David Dejute',p:'Nonpartisan',d:'Law Professor/Attorney',bio:`Harvard Law graduate and former Assistant U.S. Attorney. Argued before the Ninth Circuit in the "Drake v. Obama" case, defending the government against birther claims about Obama's presidential eligibility. Now directs the Pepperdine Caruso Disaster Relief Clinic and is of counsel at Michelman & Robinson. Brings 30+ years of trial and appellate experience to this judicial campaign.`},
{n:'Anthony (A.J.) Bayne',p:'Nonpartisan',d:'Deputy Public Defender, County of LA',bio:`Deputy public defender for 25+ years, spending 19 of those years at the Compton Courthouse handling severe felonies and supervising new misdemeanor attorneys. Has tried more than 100 jury trials over his career. Represents the experienced public-defender contingent in a three-way race that also includes a law professor and a career city attorney.`},
]},
]},
];

/* helpers */
const allRaces=()=>BALLOT.flatMap(s=>s.races);
const totalRaces=()=>allRaces().length;
const esc=s=>s.replace(/'/g,"\\'").replace(/"/g,'&quot;');
const bioKey=s=>`bio-${s.replace(/[^a-z0-9]/gi,'_').toLowerCase()}`;
const sel={};
let filter='All';

function jurClass(j){return {state:'j-state',city:'j-city',county:'j-county',judicial:'j-judicial'}[j]||'j-state'}
function jurLabel(j){return {state:'STATE',city:'CITY/LOCAL',county:'COUNTY',judicial:'JUDICIAL'}[j]||'STATE'}

/* RENDER */
function render(){
  openBio=null;
  const main=document.getElementById('main');
  main.innerHTML='';
  BALLOT.forEach(section=>{
    const sh=document.createElement('div');
    sh.className='sec-hdr';
    sh.innerHTML=`<span class="sec-title">${section.section}</span><div class="sec-line"></div>`;
    main.appendChild(sh);
    section.races.forEach(race=>main.appendChild(buildCard(race)));
  });
  applyFilter();updateProg();updateSB();
}

function buildCard(race){
  const card=document.createElement('div');
  card.className='card'+(sel[race.id]?' sel':'');
  card.id='card-'+race.id;
  const uncontested=race.cx.length===1;
  card.innerHTML=`
    <div class="card-hdr">
      <div class="card-left">
        <span class="jtag ${jurClass(race.jur)}">${jurLabel(race.jur)}</span>
        <span class="card-title">${race.office}</span>
      </div>
      <div class="card-right">
        <span class="c-count">${race.cx.length} candidate${race.cx.length!==1?'s':''}</span>
        <button class="btn-clr" onclick="clearRace('${race.id}')">Clear</button>
      </div>
    </div>
    <div class="clist" id="list-${race.id}">
      ${race.cx.map(c=>rowHTML(race.id,c)).join('')}
    </div>
    ${uncontested?`<div class="uncontested">↳ Uncontested — only candidate listed on ballot</div>`:''}
    ${race.note?`<div class="race-note">↳ ${race.note}</div>`:''}
  `;
  return card;
}

function rowHTML(rid,c){
  const party=P[c.p]||P['No Party Preference'];
  const on=sel[rid]===c.n;
  const bid=`${rid}-${bioKey(c.n)}`;
  const dHtml=c.d?`<span class="cdesc" title="${c.d}">${c.d}</span>`:'';
  const flagHtml=c.flag?`<span class="cflag" title="${c.flag}">⚠</span>`:'';
  const nameHtml=c.bio
    ?`<span class="cname-link" onclick="toggleBio(event,'${bid}')">${c.n} <span class="bio-chev" id="chev-${bid}">▾</span></span>`
    :`<span class="cname">${c.n}</span>`;
  const bioHtml=c.bio
    ?`<div class="bio-drawer" id="${bid}"><div class="bio-inner">${c.bio}</div></div>`
    :'';
  return `<div class="cwrap">
    <div class="crow${on?' on':''}" data-rid="${rid}" data-name="${esc(c.n)}" data-party="${c.p}" onclick="pick('${rid}','${esc(c.n)}')">
      <div class="radio"></div>
      ${nameHtml}
      <span class="pbadge" style="color:${party.c};background:${party.bg}">${party.s}</span>
      ${dHtml}${flagHtml}
    </div>${bioHtml}
  </div>`;
}

/* TOGGLE BIO */
function toggleBio(e,bid){
  e.stopPropagation();
  const drawer=document.getElementById(bid);
  if(!drawer)return;
  if(openBio&&openBio!==bid){
    const prev=document.getElementById(openBio);
    if(prev){prev.classList.remove('open');}
    const pc=document.getElementById('chev-'+openBio);
    if(pc)pc.style.transform='';
  }
  const isOpen=drawer.classList.contains('open');
  drawer.classList.toggle('open',!isOpen);
  const chev=document.getElementById('chev-'+bid);
  if(chev)chev.style.transform=isOpen?'':'rotate(180deg)';
  openBio=isOpen?null:bid;
}

/* SELECTION */
function pick(rid,name){
  if(sel[rid]===name){delete sel[rid];}else{sel[rid]=name;}
  const list=document.getElementById('list-'+rid);
  list.querySelectorAll('.crow').forEach(r=>r.classList.toggle('on',r.dataset.name===sel[rid]));
  document.getElementById('card-'+rid).classList.toggle('sel',!!sel[rid]);
  updateProg();updateSB();
}

function clearRace(rid){
  delete sel[rid];
  const list=document.getElementById('list-'+rid);
  if(list)list.querySelectorAll('.crow').forEach(r=>r.classList.remove('on'));
  const card=document.getElementById('card-'+rid);
  if(card)card.classList.remove('sel');
  updateProg();updateSB();
}

function clearAll(){Object.keys(sel).forEach(k=>delete sel[k]);render();}

/* FILTER */
function setFilter(tab){
  if(openBio){const p=document.getElementById(openBio);if(p)p.classList.remove('open');const pc=document.getElementById('chev-'+openBio);if(pc)pc.style.transform='';openBio=null;}
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  tab.classList.add('on');filter=tab.dataset.f;applyFilter();
}

function applyFilter(){
  BALLOT.forEach(section=>{
    section.races.forEach(race=>{
      const card=document.getElementById('card-'+race.id);if(!card)return;
      const list=document.getElementById('list-'+race.id);
      const wraps=[...list.querySelectorAll('.cwrap')];
      if(filter==='All'){
        card.classList.remove('hidden');
        wraps.forEach(w=>w.classList.remove('dimmed'));
        wraps.sort((a,b)=>{
          const an=a.querySelector('.crow').dataset.name;
          const bn=b.querySelector('.crow').dataset.name;
          return race.cx.findIndex(c=>c.n===an)-race.cx.findIndex(c=>c.n===bn);
        });
        wraps.forEach(w=>list.appendChild(w));
      }else{
        const has=race.cx.some(c=>c.p===filter);
        card.classList.toggle('hidden',!has);if(!has)return;
        wraps.forEach(w=>w.classList.toggle('dimmed',w.querySelector('.crow').dataset.party!==filter));
        wraps.sort((a,b)=>{
          const am=a.querySelector('.crow').dataset.party===filter?0:1;
          const bm=b.querySelector('.crow').dataset.party===filter?0:1;
          if(am!==bm)return am-bm;
          const an=a.querySelector('.crow').dataset.name;
          const bn=b.querySelector('.crow').dataset.name;
          return race.cx.findIndex(c=>c.n===an)-race.cx.findIndex(c=>c.n===bn);
        });
        wraps.forEach(w=>list.appendChild(w));
      }
    });
  });
}

/* PROGRESS */
function updateProg(){
  const total=totalRaces(),done=Object.keys(sel).length;
  document.getElementById('pf').style.width=(total>0?done/total*100:0)+'%';
  document.getElementById('pl').textContent=`${done} of ${total} filled`;
}

/* SIDEBAR */
function updateSB(){
  const scroll=document.getElementById('sb-scroll');
  const empty=document.getElementById('sb-empty');
  const ct=document.getElementById('sb-ct');
  const count=Object.keys(sel).length;
  ct.textContent=`${count} selection${count!==1?'s':''}`;
  scroll.querySelectorAll('.sb-section,.sb-item').forEach(e=>e.remove());
  if(count===0){empty.style.display='block';return;}
  empty.style.display='none';
  BALLOT.forEach(section=>{
    let added=false;
    section.races.forEach(race=>{
      if(!sel[race.id])return;
      if(!added){
        const se=document.createElement('div');se.className='sb-section';se.textContent=section.section;scroll.appendChild(se);added=true;
      }
      const cand=race.cx.find(c=>c.n===sel[race.id]);
      const party=P[cand?.p]||P['No Party Preference'];
      const item=document.createElement('div');item.className='sb-item';
      item.onclick=()=>document.getElementById('card-'+race.id)?.scrollIntoView({behavior:'smooth',block:'center'});
      item.innerHTML=`<span class="sb-office">${race.office}</span><span class="sb-name">${sel[race.id]}</span><span class="sb-party" style="color:${party.c}">${party.s} &mdash; ${cand?.p||''}</span>`;
      scroll.appendChild(item);
    });
  });
}

function toggleSB(){document.getElementById('sb').classList.toggle('open');}

/* MEASURE */
function measure(){
  const h=document.getElementById('hdr').offsetHeight;
  document.documentElement.style.setProperty('--hh',h+'px');
  const sb=document.getElementById('sb');sb.style.top=h+'px';sb.style.height=`calc(100vh - ${h}px)`;
}

render();measure();window.addEventListener('resize',measure);
</script>

/* ── Wizard State ───────────────────────────────────── */
const WZ={step:0,answers:[],results:null};

/* ── Open / Close ───────────────────────────────────── */
function wzOpen(){
  WZ.step=0;WZ.answers=[];WZ.results=null;
  const bd=document.getElementById('wz-backdrop');
  bd.style.display='flex';
  requestAnimationFrame(()=>bd.classList.add('wz-vis'));
  document.getElementById('wz-ht').textContent='⚡ Ballot Wizard';
  document.getElementById('wz-pw').style.display='';
  wzRestoreFoot();wzRenderStep(0);wzUpdProg(0);
  document.addEventListener('keydown',wzKey);
}
function wzClose(){
  const bd=document.getElementById('wz-backdrop');
  bd.classList.remove('wz-vis');
  setTimeout(()=>{bd.style.display='none';},240);
  document.removeEventListener('keydown',wzKey);
}
function wzKey(e){
  if(e.key==='Escape'){wzClose();return;}
  const map={a:0,b:1,c:2,d:3,e:4};
  const idx=map[e.key.toLowerCase()];
  if(idx!==undefined&&WZ.step<10){wzSelectOpt(WZ.step,idx);}
}

/* ── Navigation ─────────────────────────────────────── */
function wzNext(){
  if(WZ.step>=10)return;
  if(!WZ.answers[WZ.step]){
    document.querySelectorAll('.wz-opt').forEach(el=>{
      el.style.borderColor='#ef4444';
      setTimeout(()=>el.style.borderColor='',700);
    });
    return;
  }
  WZ.step++;
  document.getElementById('wz-card').scrollTop=0;
  if(WZ.step===10){
    const profile=wzBuildProfile(WZ.answers);
    WZ.results=wzComputeResults(profile);
    wzRenderResults(WZ.results);
  }else{
    wzRenderStep(WZ.step);wzUpdProg(WZ.step);
  }
}
function wzPrev(){
  if(WZ.step===0)return;
  WZ.step--;
  document.getElementById('wz-pw').style.display='';
  document.getElementById('wz-ht').textContent='⚡ Ballot Wizard';
  wzRestoreFoot();wzRenderStep(WZ.step);wzUpdProg(WZ.step);
  document.getElementById('wz-card').scrollTop=0;
}
function wzRestoreFoot(){
  document.getElementById('wz-foot').innerHTML=
    `<button class="btn" id="wz-prev" onclick="wzPrev()">← Back</button>
     <button class="btn btn-p" id="wz-next" onclick="wzNext()">Next →</button>`;
}

/* ── Render Question ────────────────────────────────── */
function wzRenderStep(si){
  const q=WQ[si];const cur=WZ.answers[si];
  let h=`<div class="wz-question">${q.q}</div>`;
  if(q.sub)h+=`<p class="wz-q-sub">${q.sub}</p>`;
  h+=`<div class="wz-options">`;
  q.opts.forEach((o,i)=>{
    const sel=cur&&cur.k===o.k?' wz-sel':'';
    h+=`<button class="wz-opt${sel}" onclick="wzSelectOpt(${si},${i})" type="button">
      <span class="wz-opt-key">${o.k}</span>
      <span class="wz-opt-text"><span class="wz-opt-label">${o.l}</span><span class="wz-opt-desc">${o.d}</span></span>
    </button>`;
  });
  h+=`</div>`;
  document.getElementById('wz-body').innerHTML=h;
  const prev=document.getElementById('wz-prev');
  if(prev)prev.disabled=(si===0);
}

function wzSelectOpt(si,oi){
  WZ.answers[si]=WQ[si].opts[oi];
  document.querySelectorAll('.wz-opt').forEach((el,i)=>el.classList.toggle('wz-sel',i===oi));
}

function wzUpdProg(step){
  document.getElementById('wz-pf').style.width=(step/10*100)+'%';
  document.getElementById('wz-sl').textContent=`Step ${step+1} of 10`;
}

/* ── Build Profile ──────────────────────────────────── */
function wzBuildProfile(ans){
  const q1=ans[0]||WQ[0].opts[2];
  let ideology=q1.ideology;
  let delta=0;
  for(let i=1;i<=7;i++){if(ans[i])delta+=(ans[i].delta||0);}
  ideology=Math.max(1,Math.min(5,ideology+delta/3.5));
  const tagSet=new Set();
  for(let i=1;i<=7;i++){if(ans[i]&&ans[i].tags)ans[i].tags.forEach(t=>tagSet.add(t));}
  const judgePreference=(ans[8]||{jp:'neutral'}).jp;
  const incumbentBonus=(ans[9]||{ib:0}).ib;
  return{ideology,tags:[...tagSet],judgePreference,incumbentBonus};
}

/* ── Score a Candidate ──────────────────────────────── */
function wzScoreCand(cand,profile,isJudicial){
  const s=SCORES[cand.n];
  if(!s)return 50;
  if(s.misconduct)return 20; // Draper misconduct cap
  if(isJudicial){
    let js;
    if(profile.judgePreference==='neutral'){js=65;}
    else if(s.judgeType===profile.judgePreference){js=85;}
    else if(s.judgeType==='civil'){js=50;}
    else{js=25;}
    if(s.tags&&s.tags.includes('reform')&&profile.ideology<2.5)js=Math.min(100,js+10);
    const ia=s.incumbent?profile.incumbentBonus:0;
    return Math.max(0,Math.min(100,Math.round(js+ia)));
  }
  const ideoDist=Math.abs(s.ideology-profile.ideology);
  const ideoScore=Math.max(0,100-(ideoDist/4)*100);
  const ct=s.tags||[];
  const mc=ct.filter(t=>profile.tags.includes(t)).length;
  const mp=Math.min(ct.length,profile.tags.length);
  const tagScore=mp>0?(mc/mp)*100:50;
  const ia=s.incumbent?profile.incumbentBonus:0;
  return Math.max(0,Math.min(100,Math.round(ideoScore*0.6+tagScore*0.4+ia)));
}

/* ── Compute All Results ────────────────────────────── */
function wzComputeResults(profile){
  const res={};
  allRaces().forEach(race=>{
    const isJ=race.jur==='judicial';
    if(race.cx.length===1){
      res[race.id]={top:{candidate:race.cx[0],matchPct:100},ranked:[{candidate:race.cx[0],matchPct:100}],auto:true,office:race.office};
      return;
    }
    const scored=race.cx.map(c=>({candidate:c,matchPct:wzScoreCand(c,profile,isJ)}))
      .sort((a,b)=>b.matchPct-a.matchPct);
    res[race.id]={top:scored[0],ranked:scored,auto:false,office:race.office,isGov:race.id==='gov'};
  });
  return res;
}

/* ── Bio excerpt ────────────────────────────────────── */
function wzExcerpt(bio){
  if(!bio)return'';
  const dot=bio.indexOf('.');
  return dot>10&&dot<180?bio.substring(0,dot+1):bio.substring(0,160)+'…';
}

/* ── Render Results ─────────────────────────────────── */
function wzRenderResults(res){
  document.getElementById('wz-ht').textContent='⚡ Your Ballot Recommendations';
  document.getElementById('wz-pw').style.display='none';

  let h=`<p class="wz-results-intro">Based on your answers, here are the best-matched candidates across all 22 races. Match % reflects ideology alignment and shared issue priorities. Click <strong>Apply to My Ballot</strong> to fill them all in — you can still change individual races manually afterward.</p>`;
  h+=`<div class="wz-grid">`;

  allRaces().forEach(race=>{
    const rec=res[race.id];if(!rec)return;
    let top=rec.top;
    // Skip suspended/withdrawn: if top candidate has a flag, use #2
    let skipNote='';
    if(top.candidate.flag&&rec.ranked.length>1){
      skipNote=`<div class="wz-warn">⚠ Top match ${top.candidate.flag.replace('⚠ ','').split('—')[0].trim()} — showing next best</div>`;
      top=rec.ranked[1];
    }
    const cand=top.candidate;
    const party=P[cand.p]||P['No Party Preference'];
    const govCls=rec.isGov?' wz-gov':'';
    const autoCls=rec.auto?' wz-auto':'';
    const pctBadge=rec.auto?`<span class="wz-rec-note">Uncontested</span>`:`<span class="wz-rec-match">${top.matchPct}% match</span>`;

    let govAlts='';
    if(rec.isGov&&rec.ranked.length>1){
      const alt2=rec.ranked[1];const alt3=rec.ranked[2];
      const skip=top.candidate.flag&&rec.ranked.length>2?rec.ranked[2]:alt2;
      govAlts=`<div class="wz-gov-alts">Also: ${skip&&skip!==top?skip.candidate.n+' ('+skip.matchPct+'%)':''}${alt3&&alt3!==top?' · '+alt3.candidate.n+' ('+alt3.matchPct+'%)':''}</div>`;
    }

    h+=`<div class="wz-rec${govCls}${autoCls}">
      <span class="wz-rec-office">${race.office}</span>
      <span class="wz-rec-name">${cand.n}</span>
      <div class="wz-rec-row">
        <span class="pbadge" style="color:${party.c};background:${party.bg}">${party.s}</span>
        ${pctBadge}
      </div>
      ${skipNote}
      <span class="wz-rec-bio">${wzExcerpt(cand.bio)}</span>
      ${govAlts}
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('wz-body').innerHTML=h;
  document.getElementById('wz-foot').innerHTML=`
    <button class="btn" onclick="wzClose()">Review Manually</button>
    <button class="btn btn-p" onclick="wzApply()">⚡ Apply to My Ballot</button>`;
}

/* ── Apply ──────────────────────────────────────────── */
function wzApply(){
  if(!WZ.results)return;
  allRaces().forEach(race=>{
    const rec=WZ.results[race.id];if(!rec)return;
    let top=rec.top;
    if(top.candidate.flag&&rec.ranked.length>1)top=rec.ranked[1];
    if(top&&top.candidate)pick(race.id,top.candidate.n);
  });
  wzClose();
  window.scrollTo({top:0,behavior:'smooth'});
}
